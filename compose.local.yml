services:
  postgres:
    image: postgres:16-alpine
    container_name: residence_explorer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: residence
      POSTGRES_PASSWORD: residence
      POSTGRES_DB: residence_explorer
    ports:
      - "54329:5432"
    volumes:
      - residence_explorer_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U residence -d residence_explorer"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  residence_explorer_pgdata:
